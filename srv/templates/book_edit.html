{{define "content"}}
<h2>📝 Edit Book</h2>

<form method="POST" style="max-width: 600px;">
    <div style="display: grid; gap: 1rem;">
        <div>
            <label>Title *</label>
            <input type="text" name="title" value="{{.Book.Title}}" required style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">
        </div>
        <div>
            <label>Author *</label>
            <input type="text" name="author" value="{{.Book.Author}}" required style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
                <label>Submitter</label>
                <input type="text" name="submitter" value="{{if .Book.Submitter.Valid}}{{.Book.Submitter.String}}{{end}}" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">
            </div>
            <div>
                <label>Page Count</label>
                <input type="number" name="page_count" value="{{if .Book.PageCount.Valid}}{{.Book.PageCount.Int64}}{{end}}" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">
            </div>
        </div>
        <div>
            <label>Tags (comma-separated)</label>
            <input type="text" name="tags" value="{{if .Book.Tags.Valid}}{{.Book.Tags.String}}{{end}}" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">
        </div>
        <div>
            <label>Status</label>
            <select name="status" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">
                <option value="proposed" {{if eq .Book.Status "proposed"}}selected{{end}}>Proposed</option>
                <option value="eligible" {{if eq .Book.Status "eligible"}}selected{{end}}>Eligible</option>
                <option value="selected" {{if eq .Book.Status "selected"}}selected{{end}}>Selected</option>
                <option value="read" {{if eq .Book.Status "read"}}selected{{end}}>Read</option>
                <option value="archived" {{if eq .Book.Status "archived"}}selected{{end}}>Archived</option>
            </select>
        </div>
        <div>
            <label>Pitch / Notes</label>
            <textarea name="pitch" rows="3" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">{{if .Book.Pitch.Valid}}{{.Book.Pitch.String}}{{end}}</textarea>
        </div>
        <div>
            <label>Description</label>
            <textarea name="description" rows="4" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">{{if .Book.Description.Valid}}{{.Book.Description.String}}{{end}}</textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
                <label>Cover URL</label>
                <input type="url" name="cover_url" value="{{if .Book.CoverUrl.Valid}}{{.Book.CoverUrl.String}}{{end}}" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">
            </div>
            <div>
                <label>ISBN</label>
                <input type="text" name="isbn" value="{{if .Book.Isbn.Valid}}{{.Book.Isbn.String}}{{end}}" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">
            </div>
        </div>
        <div>
            <label>Content Notes</label>
            <textarea name="content_notes" rows="2" style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text);">{{if .Book.ContentNotes.Valid}}{{.Book.ContentNotes.String}}{{end}}</textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 0.5rem; background: rgba(255,255,255,0.03); border-radius: 4px;">
            <div><small style="color: var(--text-secondary);">Source: {{if .Book.MetadataSource.Valid}}{{.Book.MetadataSource.String}}{{else}}manual{{end}}</small></div>
            <div><small style="color: var(--text-secondary);">Source ID: {{if .Book.MetadataID.Valid}}{{.Book.MetadataID.String}}{{else}}—{{end}}</small></div>
        </div>
    </div>
    <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem;">
        <button type="submit" class="btn">Save Changes</button>
        <a href="/admin/{{.AdminToken}}/books" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{{end}}
